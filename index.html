<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nutelch — cusp explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/demo/style.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <main id="app">
      <header class="masthead">
        <h1 class="wordmark">nut<span>elch</span></h1>
        <p class="tagline">chroma, measured relative to the shell</p>
      </header>

      <section class="stage">
        <div class="stage__viz">
          <div id="slice" class="slice-host"></div>
          <div id="wheel" class="wheel-host"></div>
        </div>

        <aside class="panel">
          <div class="swatch-wrap">
            <div class="swatch">
              <div class="swatch__cell" id="sw-okhsl"><small><b>okhsl</b><span class="cv"></span></small></div>
              <div class="swatch__cell swatch__cell--main" id="sw-nut"><small><b>nutelch · relC</b><span class="cv"></span></small></div>
              <div class="swatch__cell" id="sw-pct"><small><b class="bn"></b><span class="cv"></span></small></div>
            </div>
            <div id="readout" class="readout"></div>
          </div>
          <div id="controls" class="controls"></div>
        </aside>
      </section>

      <footer class="colophon">
        <span class="dot-legend"><i class="k k--lut"></i> LUT · nutelch</span>
        <span class="dot-legend"><i class="k k--actual"></i> actual · culori, live</span>
        <span class="dot-legend"><i class="k k--okhsl"></i> okhsl · Ottosson (sRGB)</span>
      </footer>
    </main>
    <script type="module" src="/src/demo/main.ts"></script>
  </body>
</html>
